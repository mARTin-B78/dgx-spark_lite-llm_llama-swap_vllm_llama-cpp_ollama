#lama-swap-config.yaml
host: "0.0.0.0"
port: 18000 # Your base port for vLLM routing
timeout: 3600
readyTimeout: 3600
healthCheckTimeout: 300
logLevel: "info" 
metricsMaxInMemory: 1000

# Global macros for cleaner model blocks
macros:
  host: "0.0.0.0"
  gpu_mem: "0.7"
  tp: "1"

models:
  # ===================================================
  # 🚀 VLLM MODELS (Optimized for GB10 / SM121)
  # ===================================================

  Qwen3.5-35B-A3B-FP8:
    ttl: 600
    cmd: >
      docker run --rm --name vllm-qwen3.5-35b-${PORT} 
      --runtime nvidia --gpus all --ipc=host --network host
      -e NVIDIA_DISABLE_FORWARD_COMPATIBILITY=1
      -e VLLM_MARLIN_USE_ATOMIC_ADD=1
      -v ${LLM_ROOT_PATH}/vllm:/models/vllm 
      -v ${REPO_CONFIG_PATH}/vllm/custom_template.jinja:/models/vllm/custom_template.jinja:ro
      ghcr.io/${GH_USER}/vllm-spark:latest
      vllm serve /models/vllm/Alibaba/Qwen3.5-35B-A3B-FP8
      --served-model-name Qwen3.5-35B-A3B-FP8
      --host ${host} --port ${PORT}
      --gpu-memory-utilization ${gpu_mem}
      --max-model-len 131072
      --kv-cache-dtype fp8
      --load-format fastsafetensors
      --attention-backend flashinfer
      --chat-template /models/vllm/custom_template.jinja
      --tensor-parallel-size ${tp}
    cmdStop: "docker stop vllm-qwen3.5-35b-${PORT}"

  Nemotron-3-Nano-30B-A3B-NVFP4:
    ttl: 300
    cmd: >
      docker run --rm --name vllm-nemotron-${PORT} 
      --runtime nvidia --gpus all --ipc=host --network host
      -v ${LLM_ROOT_PATH}/vllm:/models/vllm 
      -e NVIDIA_DISABLE_FORWARD_COMPATIBILITY=1
      -e VLLM_USE_FLASHINFER_MOE_FP4=1 
      ghcr.io/${GH_USER}/vllm-spark:latest 
      vllm serve /models/vllm/Nvidia/Nemotron-3-Nano-30B-A3B-NVFP4/hub/models--nvidia--NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4/snapshots/ab537beb128913d389306a4d0cc1a2097ac5a5af
      --served-model-name Nemotron-3-Nano-30B-A3B-NVFP4
      --host ${host} --port ${PORT} 
      --gpu-memory-utilization ${gpu_mem}
      --max-model-len 32768
      --kv-cache-dtype fp8
      --load-format fastsafetensors
      --attention-backend flashinfer
      --trust-remote-code
    cmdStop: "docker stop vllm-nemotron-${PORT}"

  # ===================================================
  # 🦙 OLLAMA MODELS (GGUF Backends)
  # ===================================================

  Qwen3.5-35B-A3B-Uncensored-GGUF:
    ttl: 600
    checkEndpoint: "/"
    cmd: >
      docker run --rm --name ollama-qwen-${PORT} 
      --runtime nvidia --gpus all --network host 
      -e OLLAMA_HOST=0.0.0.0:${PORT} 
      -v ${LLM_ROOT_PATH}/ollama:/root/.ollama 
      ghcr.io/${GH_USER}/ollama-spark:latest
      ollama serve
    cmdStop: "docker stop ollama-qwen-${PORT}"

  TheDrummer_GLM-Steam:
    ttl: 600
    cmd: >
      OLLAMA_HOST=${host}:${PORT} 
      OLLAMA_MODELS=${LLM_ROOT_PATH}/ollama 
      ollama serve
    cmdStop: "kill $(lsof -t -i:${PORT})"
