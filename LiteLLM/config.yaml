# LiteLLM config.yaml
general_settings:
  # ===================================================
  # 🛡️ SECURITY & ADMIN UI (Using Environment Variables)
  # ===================================================
  master_key: ${LITELLM_MASTER_KEY}
  ui_username: "martin"
  ui_password: ${LITELLM_MASTER_KEY}
  ui_access_mode: "admin_only"
  disable_master_key_return: true
  allow_model_creation: false

# Global safety: matching your local idle times
globalTTL: 600 

model_list:
  # ===================================================
  # 🦙 LLAMA-SWAP MODELS (Routed via localhost:9292)
  # ===================================================

  # --- Qwen 3.5 Series (Native Reasoning) ---
  - model_name: Qwen3.5-35B-A3B-FP8
    litellm_params:
      model: openai/Qwen3.5-35B-A3B-FP8
      api_base: "http://127.0.0.1:9292/v1"
      api_key: "sk-lama-swap-local"
      drop_params: true
      include_reasoning: true 
      supports_reasoning: true
      merge_reasoning_content_in_choices: false
      extra_body:
        enable_thinking: true
        chat_template_kwargs: {"enable_thinking": true}
      max_tokens: 4096

  # --- Qwen 3.5 Series (Heavy Thinker) ---
  - model_name: Qwen3.5-122B-A10B-int4-AutoRound
    litellm_params:
      model: openai/Qwen3.5-122B-A10B-int4-AutoRound
      api_base: "http://127.0.0.1:9292/v1"
      api_key: "sk-lama-swap-local"
      include_reasoning: true 
      supports_reasoning: true
      merge_reasoning_content_in_choices: false
      max_tokens: 4096

  # --- Qwen 3 Series (Multimodal Reasoning) ---
  - model_name: Qwen3-Omni-30B-A3B-Instruct
    litellm_params:
      model: openai/Qwen3-Omni-30B-A3B-Instruct
      api_base: "http://127.0.0.1:9292/v1"
      api_key: "sk-lama-swap-local"
      include_reasoning: true 
      supports_reasoning: true
      merge_reasoning_content_in_choices: false

  # --- NVIDIA Nemotron Series ---
  - model_name: Nemotron-3-Nano-30B-A3B-NVFP4
    litellm_params:
      model: openai/Nemotron-3-Nano-30B-A3B-NVFP4
      api_base: "http://127.0.0.1:9292/v1"
      api_key: "sk-lama-swap-local"
      include_reasoning: true 
      supports_reasoning: true
      merge_reasoning_content_in_choices: false

  - model_name: Nemotron-3-Super-120B-A12B-NVFP4
    litellm_params:
      model: openai/Nemotron-3-Super-120B-A12B-NVFP4
      api_base: "http://127.0.0.1:9292/v1"
      api_key: "sk-lama-swap-local"
      include_reasoning: true
      supports_reasoning: true
      merge_reasoning_content_in_choices: false
      max_tokens: 8192

  # --- GPT-OSS (Advanced Reasoning Depth) ---
  - model_name: GPT-OSS-120B
    litellm_params:
      model: openai/GPT-OSS-120B
      api_base: "http://127.0.0.1:9292/v1"
      api_key: "sk-lama-swap-local"
      include_reasoning: true 
      supports_reasoning: true
      merge_reasoning_content_in_choices: false

  # ===================================================
  # 🎭 COMPATIBILITY & OLLAMA
  # ===================================================

  - model_name: claude-3-5-sonnet-20241022
    litellm_params:
      model: openai/GLM-4.6-derestricted
      api_base: "http://127.0.0.1:11434"
      api_key: "sk-Im9WgGpaMhelpsgO_dFLXw"

  - model_name: dolphin-mistral-24b
    litellm_params:
      model: ollama/ikiru/Dolphin-Mistral-24B-Venice-Edition:latest
      api_base: "http://127.0.0.1:11434"

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 600
  merge_reasoning_content_in_choices: false

# Dynamically injected from .env
database_url: ${DATABASE_URL}
